    <style>
      :root {
        --slider-track-bg: rgba(255, 255, 255, 0.3);
        --slider-track-progress: white;
        --slider-track-disabled-bg: rgba(107, 114, 128, 0.3);
        --slider-track-disabled-progress: #6b7280;
      }
      body[data-theme="light"] {
        --slider-track-bg: rgba(31, 41, 55, 0.3);
        --slider-track-progress: #1f2937;
        --slider-track-disabled-bg: rgba(156, 163, 175, 0.3);
        --slider-track-disabled-progress: #9ca3af;
      }
      .custom-slider {
        background-color: transparent;
      }

      /* Webkit Browsers (Chrome, Safari) */
      .custom-slider::-webkit-slider-runnable-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: linear-gradient(to right, var(--slider-track-progress) 0%, var(--slider-track-progress) var(--progress-percent, 0%), var(--slider-track-bg) var(--progress-percent, 0%), var(--slider-track-bg) 100%);
        border-radius: 999px;
      }
      
      .custom-slider:disabled::-webkit-slider-runnable-track {
        background: linear-gradient(to right, var(--slider-track-disabled-progress) 0%, var(--slider-track-disabled-progress) var(--progress-percent, 0%), var(--slider-track-disabled-bg) var(--progress-percent, 0%), var(--slider-track-disabled-bg) 100%);
      }

      .custom-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 0;
        height: 0;
      }

      /* Mozilla Firefox */
      .custom-slider::-moz-range-track {
        width: 100%;
        height: 4px;
        cursor: pointer;
        background: linear-gradient(to right, var(--slider-track-progress) 0%, var(--slider-track-progress) var(--progress-percent, 0%), var(--slider-track-bg) var(--progress-percent, 0%), var(--slider-track-bg) 100%);
        border-radius: 999px;
      }
      
      .custom-slider:disabled::-moz-range-track {
         background: linear-gradient(to right, var(--slider-track-disabled-progress) 0%, var(--slider-track-disabled-progress) var(--progress-percent, 0%), var(--slider-track-disabled-bg) var(--progress-percent, 0%), var(--slider-track-disabled-bg) 100%);
      }

      .custom-slider::-moz-range-thumb {
        width: 0;
        height: 0;
        border: 0;
      }
    </style>
